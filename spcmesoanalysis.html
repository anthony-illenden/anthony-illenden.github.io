<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPC Mesoscale Analysis</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/anthony-illenden/anthony-illenden.github.io/main/images/bolt.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Roboto', sans-serif; /* Update font-family */
        }
        nav {
            background-color: #333;
            overflow: hidden;
            text-align: center;
        }
        nav a {
            display: inline-block;
            color: #f2f2f2;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
        }
        nav a:hover {
            background-color: #ddd;
            color: black;
        }
        .hero-section {
            background-image: url('https://raw.githubusercontent.com/anthony-illenden/anthony-illenden.github.io/main/images/awips.png');
            background-size: cover;
            background-position: center;
            height: 400px;
            position: relative;
            width: 100vw;
        }
        .hero-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 5px;
            text-align: center;
        }
        .hero-text h1 {
            margin: 0;
            font-size: 2em;
        }
        .container {
            max-width: 800px;
            margin: auto;
            margin-top: 40px;
        }
        .mode-selector {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .mode-selector label {
            margin-right: 0;
        }
        .mode-selector button {
            padding: 10px 15px;
            margin: 0 5px;
            cursor: pointer;
            border: 2px solid #333;
            background-color: white;
            border-radius: 4px;
        }
        .mode-selector button.active {
            background-color: #333;
            color: white;
        }
        .controls {
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .panel-control {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .panel-control label {
            margin-right: 0;
            font-weight: bold;
            font-size: 0.9em;
        }
        .controls select,
        .controls input {
            padding: 8px;
            margin-right: 0;
        }
        .error {
            color: red;
            font-weight: bold;
        }
        .image-container {
            margin-top: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0px;
        }
        .image-panel {
            text-align: center;
        }
        .image-panel h3 {
            margin: 0 0 10px 0;
            font-size: 1em;
        }
        img {
            max-width: 75%;
            height: auto;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="hero-section">
        <div class="hero-text">
            <h1>SPC Mesoscale Analysis</h1>
        </div>
    </div>
    <nav>
        <a href="https://anthony-illenden.github.io/index.html">Home</a>
        <a href="https://anthony-illenden.github.io/semichigan.html">SE Michigan</a>
        <a href="https://anthony-illenden.github.io/snowdaycalc.html">Snow Day Calculator</a>
        <a href="https://anthony-illenden.github.io/spcmesoanalysis.html">SPC Mesoanalysis</a>
        <a href="https://anthony-illenden.github.io/models.html">Models</a>
        <a href="https://anthony-illenden.github.io/winter.html">Winter</a>
        <a href="https://anthony-illenden.github.io/about.html">About</a>
    </nav>
    <div class="container">
        <h1>SPC Mesoscale Analysis</h1>
    </div>
    <div class="container">
        <label for="sectorSelect">Select Sector:</label>
        <select id="sectorSelect" onchange="updateParameters()">
            <option value="s19">CONUS</option>
            <option value="s13">Northern Great Plains</option>
            <option value="s14">Central Great Plains</option>
            <option value="s15">Southern Great Plains</option>
            <option value="s16">Northeast</option>
            <option value="s17">Southeast</option>
            <option value="s20">Midwest</option>
            <option value="s21">Great Lakes</option>
        </select>
    </div>

    <div class="container">
        <div class="mode-selector">
            <label>Display Mode:</label>
            <button data-mode="single" onclick="setMode('single', event)">Single Panel</button>
            <button class="active" data-mode="grid" onclick="setMode('grid', event)">4 Panel</button>
        </div>
    </div>

    <div class="container">
        <div class="controls" id="controls">
            <div class="panel-control">
                <label for="panel1Select">Panel 1</label>
                <select id="panel1Select" onchange="displayAllGIFs()"></select>
            </div>
            <div class="panel-control">
                <label for="panel2Select">Panel 2</label>
                <select id="panel2Select" onchange="displayAllGIFs()"></select>
            </div>
            <div class="panel-control">
                <label for="panel3Select">Panel 3</label>
                <select id="panel3Select" onchange="displayAllGIFs()"></select>
            </div>
            <div class="panel-control">
                <label for="panel4Select">Panel 4</label>
                <select id="panel4Select" onchange="displayAllGIFs()"></select>
            </div>
        </div>
    </div>

        <div class="image-container" id="imageContainer">
            <div class="image-panel" id="panel1">
                <h3>Panel 1</h3>
                <img id="gifDisplay-1" src="" alt="Panel 1">
            </div>
            <div class="image-panel" id="panel2">
                <h3>Panel 2</h3>
                <img id="gifDisplay-2" src="" alt="Panel 2">
            </div>
            <div class="image-panel" id="panel3">
                <h3>Panel 3</h3>
                <img id="gifDisplay-3" src="" alt="Panel 3">
            </div>
            <div class="image-panel" id="panel4">
                <h3>Panel 4</h3>
                <img id="gifDisplay-4" src="" alt="Panel 4">
            </div>
        </div>
    </div>

    <script>
        // Parameter display names
        const parameterNames = {
            // Thermodynamics
            mlcp: 'Mixed-Layer CAPE',
            sbcp: 'Surface-Based CAPE',
            mucp: 'Most-Unstable CAPE',
            dcape: 'Downdraft CAPE',
            lllr: 'Low-Level Lapse Rates',
            laps: 'Mid-Level Lapse Rates',
            lclh: 'Lifted Condensation Height',
            lfch: 'Level of Free Convection Height',

            // Soundings
            skewt: 'Skew-T Log-P',
            hodo: 'Hodographs',

            // Wind Fields
            '300mb': '300mb Wind',
            '500mb': '500mb Wind',
            '700mb': '700mb Wind',
            '850mb2': '850mb Wind',
            '925mb': '925mb Wind',

            // Shear / Kinematics
            eshr: 'Effective Bulk Shear',
            shr1: 'Bulk Shear 0-1 km',
            shr3: 'Bulk Shear 0-6 km',
            srh1: 'SRH 0-1 km',
            srh3: 'SRH 0-3 km',

            // Composite Severe Parameters
            cpsh: 'MUCAPE / Effective Bulk Shear',
            mlcp_eshr: 'MLCAPE / Effective Bulk Shear',
            '3cvr': '3CAPE & Surface Vorticity',
            hail: 'Hail',
            scp: 'Supercell Composite (SCP)',
            stpc: 'Significant Tornado Parameter (effective inflow)',
            vtp3: 'Violent Tornado Parameter',

            // Advection
            vadv: 'Differential Vorticity Advection',
            padv: 'Potential Vorticity Advection',
            tadv_925: '925mb Temperature Advection',
            tadv: '850mb Temperature Advection',
            '7tad': '700mb Temperature Advection',
            thea: 'Surface Theta-E Advection',

            // Frontogenesis
            '925f': '1000-925mb Frontogenesis',
            '98ft': '925-850mb Frontogenesis',
            '857f': '850-700mb Frontogenesis',
            '75ft': '700-500mb Frontogenesis',

            // Moisture
            mcon: 'Moisture Convergence',
            mxth: 'Surface Mixing Ratio',
            mixr: 'Mean Mixing Ratio',
            tran_925: '925mb Moisture Transport',
            tran: '850mb Moisture Transport',

            // Surface / Pressure
            pmsl: 'MSLP and Winds',
            pchg: 'Two-Hour Pressure Change',
            '500mb_chg': '12hr Height Falls (500mb)',
            dwpt_chg: '3 Hour Dewpoint Change'
        };


        
        const parameterCategories = {
            'Thermodynamics': [
                'mlcp','sbcp','mucp','dcape','lllr','laps','lclh','lfch'
            ],

            'Soundings': [
                'skewt','hodo'
            ],

            'Winds': [
                '300mb','500mb','700mb','850mb2','925mb'
            ],

            'Wind Shear': [
                'eshr','shr1','shr3','srh1','srh3'
            ],

            'Composite Parameters': [
                'cpsh','mlcp_eshr','3cvr','hail','scp', 'stpc','vtp3'
            ],

            'Advection': [
                'vadv','padv','tadv_925','tadv','7tad','thea'
            ],

            'Frontogenesis': [
                '925f','98ft','857f','75ft'
            ],

            'Moisture': [
                'mcon','mxth','mixr','tran_925','tran'
            ],

            'Surface / Pressure': [
                'pmsl','pchg','500mb_chg','dwpt_chg'
            ]
        };


        // All variables sorted alphabetically by display name
        const allVariables = Object.keys(parameterNames).sort((a, b) =>
            parameterNames[a].localeCompare(parameterNames[b])
        );

        const urlPatterns = {
            default: '/${parameterCode}/${parameterCode}_sf.gif',
            skewt: '/${parameterCode}/${parameterCode}.gif',
            dcape: '/${parameterCode}/${parameterCode}.gif',
            mcon: '/${parameterCode}/${parameterCode}.gif',
            pmsl: '/${parameterCode}/${parameterCode}.gif',
            mxth: '/${parameterCode}/${parameterCode}.gif',
            mixr: '/${parameterCode}/${parameterCode}.gif',
            pchg: '/${parameterCode}/${parameterCode}.gif',
            '925f': '/${parameterCode}/${parameterCode}.gif',
            '98ft': '/${parameterCode}/${parameterCode}.gif',
            '857f': '/${parameterCode}/${parameterCode}.gif',
            '75ft': '/${parameterCode}/${parameterCode}.gif',
            cpsh: '/${parameterCode}/${parameterCode}.gif',
            mlcp_eshr: '/${parameterCode}/${parameterCode}.gif',
            '3cvr': '/${parameterCode}/${parameterCode}.gif',
            hail: '/${parameterCode}/${parameterCode}.gif',
            tran_925: '/${parameterCode}/${parameterCode}.gif',
            tran: '/${parameterCode}/${parameterCode}.gif'
            ,
            // SPC mesoanalysis specific patterns
            '500mb_chg': '/${parameterCode}/${parameterCode}.gif',
            'scp': '/${parameterCode}/${parameterCode}.gif',
            'stpc': '/${parameterCode}/${parameterCode}.gif',
            'vtp3': '/${parameterCode}/${parameterCode}.gif',
            'hodo': '/${parameterCode}/${parameterCode}.gif',
            'eshr': '/${parameterCode}/${parameterCode}.gif',
            'shr1': '/${parameterCode}/${parameterCode}.gif',
            'shr3': '/${parameterCode}/${parameterCode}.gif',
            'srh1': '/${parameterCode}/${parameterCode}.gif',
            'srh3': '/${parameterCode}/${parameterCode}.gif',
            'dwpt_chg': '/${parameterCode}/${parameterCode}.gif',
            'thea': '/${parameterCode}/${parameterCode}.gif'
        };

        let currentMode = 'grid';
        let imageCount = 4;

        function setMode(mode, evt) {
            currentMode = mode;
            imageCount = mode === 'single' ? 1 : 4;

            // Update button styles
            document.querySelectorAll('.mode-selector button').forEach(btn => {
                btn.classList.remove('active');
            });
            if (evt && evt.target) {
                evt.target.classList.add('active');
            } else {
                const btn = document.querySelector(`.mode-selector button[data-mode="${mode}"]`);
                if (btn) btn.classList.add('active');
            }

            // Update display
            const container = document.getElementById('imageContainer');
            const panels = document.querySelectorAll('.image-panel');

            if (mode === 'single') {
                container.style.gridTemplateColumns = '1fr';
                panels.forEach((p, i) => {
                    p.style.display = i === 0 ? 'block' : 'none';
                });
                document.getElementById('controls').style.gridTemplateColumns = '1fr';
            } else {
                container.style.gridTemplateColumns = '1fr 1fr';
                panels.forEach(p => {
                    p.style.display = 'block';
                });
                document.getElementById('controls').style.gridTemplateColumns = 'repeat(2, 1fr)';
            }

            displayAllGIFs();
        }

        function initializeSelectDropdowns() {
            for (let i = 1; i <= 4; i++) {
                const select = document.getElementById(`panel${i}Select`);
                select.innerHTML = '';

                // Populate by category with optgroup headings
                Object.keys(parameterCategories).forEach(category => {
                    const codes = parameterCategories[category].slice();
                    // sort codes by their display name
                    codes.sort((a, b) => parameterNames[a].localeCompare(parameterNames[b]));
                    const optgroup = document.createElement('optgroup');
                    optgroup.label = category;
                    codes.forEach(code => {
                        if (!(code in parameterNames)) return;
                        const option = document.createElement('option');
                        option.value = code;
                        option.textContent = parameterNames[code];
                        optgroup.appendChild(option);
                    });
                    select.appendChild(optgroup);
                });
            }
        }

        function displayGIF(panelNumber) {
            const sectorSelect = document.getElementById('sectorSelect');
            const select = document.getElementById(`panel${panelNumber}Select`);
            const gifDisplay = document.getElementById(`gifDisplay-${panelNumber}`);

            if (!select.value) return;

            const baseUrl = 'https://www.spc.noaa.gov/exper/mesoanalysis/';
            const sectorCode = sectorSelect.value;
            const parameterCode = select.value;

            const pattern = urlPatterns[parameterCode] || urlPatterns.default;
            const gifUrl = `${baseUrl}${sectorCode}${pattern.replace(/\${parameterCode}/g, parameterCode)}`;

            gifDisplay.src = gifUrl;
        }

        function displayAllGIFs() {
            for (let i = 1; i <= 4; i++) {
                if (currentMode === 'single') {
                    if (i === 1) displayGIF(1);
                } else {
                    displayGIF(i);
                }
            }
        }

        function updateParameters() {
            displayAllGIFs();
        }

        window.onload = function() {
            initializeSelectDropdowns();
            document.getElementById('panel1Select').value = 'pmsl';
            document.getElementById('panel2Select').value = 'mlcp';
            document.getElementById('panel3Select').value = 'vadv';
            document.getElementById('panel4Select').value = '300mb';
            setMode('grid');
        };
    </script>
</body>
</html>
