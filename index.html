<!DOCTYPE html>
<html>
<head>
    <title>Plot</title>
    <style>
        img {
            display: block;
            margin: auto;
            max-width: 100%;
        }
    </style>
</head>
<body>
    <h1>Plot</h1>
    <div id="plot-container">
        <img id="plot-image" src="" alt="Plot">
    </div>

    <script>
        // Fetch the plot data from the Flask server
        fetch('/data')
            .then(response => response.json())
            .then(data => {
                // Create a new image element
                const image = new Image();
                image.src = 'data:image/png;base64,' + data.plot_data;

                // Append the image to the plot container
                const plotContainer = document.getElementById('plot-container');
                plotContainer.appendChild(image);
            });
    </script>
</body>
</html>
